<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Residency — App Store Screenshots</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         max-width: 1000px; margin: 0 auto; padding: 2rem 1.25rem 4rem; color: #1a1a1a; }
  h1 { font-size: 1.5rem; } h2 { margin-top: 2.5rem; }
  p.note { color: #555; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
  .card { border: 1px solid #e2e2e2; border-radius: 10px; padding: 8px; text-align: center; }
  .card img { width: 100%; height: auto; border-radius: 6px; display: block; }
  .card a { display: inline-block; margin-top: 6px; font-size: .8rem; color: #b8860b; text-decoration: none; }
  .card .n { font-size: .75rem; color: #888; }
</style>
</head>
<body>
<h1>Residency — App Store screenshots</h1>
<p class="note">Right-click any image → “Save Image As…”, or use the download link under it.
Upload the <strong>iPhone 6.9"</strong> set to the iPhone slot and the <strong>iPad 13"</strong>
set to the iPad slot, both in order 1→5.</p>

<h2>iPhone 6.9" (1320×2868) — 5 images</h2>
<div class="grid" id="iphone"></div>

<h2>iPad 13" (2064×2752) — 5 images</h2>
<div class="grid" id="ipad"></div>

<script>
const shots = ['01-home-dashboard','02-threshold-warning','03-onboarding-signin','04-onboarding-privacy','05-get-started'];
function fill(id, prefix) {
  const el = document.getElementById(id);
  el.innerHTML = shots.map((s,i) => {
    const file = `shots/${prefix}-${s}.png`;
    return `<div class="card"><div class="n">${i+1}</div>
      <img src="${file}" alt="${prefix} ${s}">
      <a href="${file}" download>Download</a></div>`;
  }).join('');
}
fill('iphone','iphone');
fill('ipad','ipad');
</script>
</body>
</html>
